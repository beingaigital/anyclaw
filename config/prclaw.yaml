# PRClaw 基础配置

# All-in-One-PR-Solution 根目录（支持绝对路径）
# 为空时，按默认推断：<anyclaw父目录>/All-in-One-PR-Solution
all_in_one_path: "/Users/biaowenhuang/Documents/All-in-One-PR-Solution"

# 默认方案输出类型（A-F）
default_output_types:
  - A
  - B
  - C

# 默认是否启用知识增强
default_use_graph_rag: true
default_use_web_search: true

# 外部搜索配置
web_search:
  provider: auto         # auto | serper | duckduckgo
  max_results: 5
  timeout_seconds: 15

# 方案导出配置
export:
  save_markdown: true
